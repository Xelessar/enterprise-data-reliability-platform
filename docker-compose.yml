x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/airflow/dags
  PROJECT_ROOT: /opt/airflow
  PYTHONPATH: /opt/airflow
  MLFLOW_TRACKING_URI: http://mlflow:5000
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  SOURCE_CSV_DIR: /opt/airflow/data/raw
  SOURCE_API_BASE_URL: ${SOURCE_API_BASE_URL}
  SOURCE_API_KEY: ${SOURCE_API_KEY}

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/airflow/dags
  - ./etl:/opt/airflow/etl
  - ./validation:/opt/airflow/validation
  - ./feature_engineering:/opt/airflow/feature_engineering
  - ./ml:/opt/airflow/ml
  - ./monitoring:/opt/airflow/monitoring
  - ./config:/opt/airflow/config
  - ./data:/opt/airflow/data
  - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init/01-create-airflow-db.sql:/docker-entrypoint-initdb.d/01-create-airflow-db.sql:ro
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/10-init-warehouse.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create --username admin --password admin
          --firstname Data --lastname Platform --role Admin --email admin@example.com || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: scheduler

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
  airflow_logs:
