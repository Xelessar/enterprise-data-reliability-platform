name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests
        run: pytest --cov=. --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/airflow.Dockerfile
          push: false
          tags: data-reliability-platform/airflow:ci

      - name: Build mlflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mlflow.Dockerfile
          push: false
          tags: data-reliability-platform/mlflow:ci

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dashboard.Dockerfile
          push: false
          tags: data-reliability-platform/dashboard:ci

  deployment-validation:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose config --quiet
